# agentctl group repo — declarative fleet definition.
# Seed from a live host with:  cp /etc/agentctl/fleet.yaml agents.yaml
# Custom skills/MCPs/subagents/tools go in ./skills ./mcp ./agents ./tools (overlay the deb defaults).
agents:
  agent-a:
    runtime: pi
    owner_id: ""
    admin: true
    skills: [agentctl, browser, dream-cycle, housekeeper, knowledge-base, memory, recall]
    channel: teams
    owner_aad: f9ad6b5b-5e10-47aa-b215-77afb2fefaed
    provider: openrouter
    model: z-ai/glm-5.2
    clitools: [browser, teams]
    cron: [dream-cycle, workspace-maintenance, zk-index]

host:
  teams_gateway: teams-a
  cron: [job-watchdog, load-monitor, runaway-reaper, telegram-watchdog]

  name: teams-a
hosts:
  teams-a: age1fru272xhnqfzsy4k48ah4wtns9pyy5pwhj24kxj77yfpympfysuqvy7kmc
